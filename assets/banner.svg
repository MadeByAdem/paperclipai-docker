<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312E81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9FAFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0E7FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(167,139,250,0.12)"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="750" cy="60" r="120" fill="rgba(139,92,246,0.08)"/>
  <circle cx="800" cy="200" r="80" fill="rgba(139,92,246,0.06)"/>
  <circle cx="100" cy="250" r="60" fill="rgba(139,92,246,0.05)"/>

  <!-- Paperclip icon -->
  <g transform="translate(80, 75) scale(1.8)" filter="url(#glow)">
    <path d="M72 30 C72 22, 62 22, 62 30 L62 78 C62 90, 46 90, 46 78 L46 38 C46 30, 56 30, 56 38 L56 72 C56 78, 48 78, 48 72 L48 44"
          fill="none" stroke="url(#clipGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title text -->
  <text x="280" y="135" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">
    Paperclip Docker
  </text>

  <!-- Subtitle -->
  <text x="280" y="175" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#A5B4FC" font-weight="400">
    Self-hosted AI orchestration platform
  </text>

  <!-- Tag pills -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="45" y="19" font-family="'Segoe UI', monospace" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="500">Docker</text>

    <rect x="100" y="0" width="110" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="155" y="19" font-family="'Segoe UI', monospace" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="500">PostgreSQL</text>

    <rect x="220" y="0" width="120" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="280" y="19" font-family="'Segoe UI', monospace" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="500">Tunnel-ready</text>

    <rect x="350" y="0" width="80" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="390" y="19" font-family="'Segoe UI', monospace" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="500">AI Agents</text>
  </g>
</svg>
